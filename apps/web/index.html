<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sukan Final v3</title>
  <style>
    body{margin:0;font-family:Arial;background:#0b1020;color:#e8eeff}header{padding:14px;background:#121a33;border-bottom:1px solid #2f4572}
    main{max-width:1250px;margin:auto;padding:14px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}
    .card{background:#121d35;border:1px solid #2d456f;border-radius:12px;padding:12px}input,select,button{width:100%;margin:4px 0;padding:9px;border-radius:8px;border:1px solid #3b578a;background:#0d162a;color:#fff}
    button{background:#356dff;border:none;cursor:pointer;font-weight:700}.metric{font-size:22px;font-weight:bold}table{width:100%;border-collapse:collapse}th,td{padding:7px;border-bottom:1px solid #2b3f68;text-align:right}
  </style>
</head>
<body>
<header>
  <h2>سكان | High-End Final Console</h2>
  <div class="grid">
    <input id="username" value="admin" placeholder="username" />
    <input id="password" value="admin123" type="password" placeholder="password" />
    <button id="login-btn">Login</button>
  </div>
  <small id="session">غير متصل</small>
</header>
<main>
  <section id="metrics" class="grid"></section>

  <section class="grid">
    <div class="card"><h3>Property</h3><form id="property-form"><input id="p_title" placeholder="title" required/><input id="p_city" placeholder="city" required/><input id="p_district" placeholder="district"/><input id="p_rooms" type="number" min="1" placeholder="rooms" required/><input id="p_rent" type="number" min="1" placeholder="base rent" required/><button>Save</button></form></div>
    <div class="card"><h3>Tenant</h3><form id="tenant-form"><input id="t_name" placeholder="name" required/><input id="t_email" placeholder="email" required/><input id="t_work" placeholder="work/study" required/><input id="t_interests" placeholder="interests comma"/><select id="t_sleep"><option>early</option><option selected>flexible</option><option>late</option></select><input id="t_clean" type="number" min="0" max="10" value="7"/><button>Save</button></form></div>
    <div class="card"><h3>Contract</h3><form id="contract-form"><input id="c_property" type="number" placeholder="property id" required/><input id="c_tenant" type="number" placeholder="tenant id" required/><input id="c_rent" type="number" placeholder="rent" required/><input id="c_deposit" type="number" value="0" placeholder="deposit" required/><input id="c_start" type="date" required/><input id="c_end" type="date" required/><button>Create</button></form></div>
    <div class="card"><h3>Payment + Expense + Ticket</h3>
      <form id="payment-form"><input id="pay_contract" type="number" placeholder="contract id" required/><input id="pay_amount" type="number" placeholder="amount" required/><input id="pay_due" type="date" required/><button>Issue Payment</button></form>
      <form id="expense-form"><input id="e_property" type="number" placeholder="property id" required/><select id="e_cat"><option>maintenance</option><option>utilities</option><option>cleaning</option><option>other</option></select><input id="e_amount" type="number" placeholder="amount" required/><input id="e_date" type="date" required/><input id="e_notes" placeholder="notes"/><button>Add Expense</button></form>
      <form id="ticket-form"><input id="tk_property" type="number" placeholder="property id" required/><input id="tk_tenant" type="number" placeholder="tenant id" required/><input id="tk_title" placeholder="ticket title" required/><select id="tk_priority"><option>low</option><option selected>medium</option><option>high</option></select><button>Create Ticket</button></form>
    </div>
  </section>

  <section class="grid">
    <div class="card"><h3>Payments</h3><table><thead><tr><th>#</th><th>contract</th><th>amount</th><th>status</th><th>action</th></tr></thead><tbody id="payments"></tbody></table></div>
    <div class="card"><h3>Audit</h3><button id="audit-btn">Load Audit</button><table><thead><tr><th>actor</th><th>action</th><th>entity</th></tr></thead><tbody id="audit"></tbody></table></div>
    <div class="card"><h3>Reports</h3><button id="csv-btn">Download Finance CSV</button><p id="report-msg"></p></div>
  </section>
</main>
<script>
const el=(id)=>document.getElementById(id); let token='';
async function api(url,opt={}){opt.headers={...(opt.headers||{}),...(token?{'x-api-token':token}:{})};const r=await fetch(url,opt);if(!r.ok){const b=await r.json().catch(()=>({}));throw new Error(b.detail||'error')}return r}
async function json(url,opt={}){return (await api(url,opt)).json()}

async function refresh(){
  const d=await json('/dashboard');
  const p=await json('/properties');
  const payments=await json('/payments?limit=30');
  el('metrics').innerHTML=`<div class='card'><div>Properties</div><div class='metric'>${d.properties}</div></div><div class='card'><div>Tenants</div><div class='metric'>${d.tenants}</div></div><div class='card'><div>Net Cash</div><div class='metric'>${d.net_cash_sar}</div></div><div class='card'><div>Open Tickets</div><div class='metric'>${d.open_tickets}</div></div><div class='card'><div>Occupancy</div><div class='metric'>${d.occupancy_rate}%</div></div><div class='card'><div>Properties Loaded</div><div class='metric'>${p.items.length}</div></div>`;
  el('payments').innerHTML=payments.items?.map(x=>`<tr><td>${x.id}</td><td>${x.contract_id}</td><td>${x.amount_sar}</td><td>${x.status}</td><td>${x.status==='pending'?`<button onclick='markPaid(${x.id})'>Mark Paid</button>`:'-'}</td></tr>`).join('')||'';
}
window.markPaid=async(id)=>{await json(`/payments/${id}/mark-paid`,{method:'POST'});refresh()}

el('login-btn').onclick=async()=>{const r=await json('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:el('username').value,password:el('password').value})});token=r.token;el('session').textContent=`Logged in as ${r.username} (${r.role})`;refresh()}
el('property-form').onsubmit=async(e)=>{e.preventDefault();await json('/properties',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:el('p_title').value,city:el('p_city').value,district:el('p_district').value,total_rooms:+el('p_rooms').value,monthly_base_rent_sar:+el('p_rent').value})});refresh()}
el('tenant-form').onsubmit=async(e)=>{e.preventDefault();await json('/tenants',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({full_name:el('t_name').value,email:el('t_email').value,work_or_study:el('t_work').value,interests:el('t_interests').value.split(',').map(v=>v.trim()).filter(Boolean),sleep_schedule:el('t_sleep').value,cleanliness_level:+el('t_clean').value})});refresh()}
el('contract-form').onsubmit=async(e)=>{e.preventDefault();await json('/contracts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({property_id:+el('c_property').value,tenant_id:+el('c_tenant').value,monthly_rent_sar:+el('c_rent').value,security_deposit_sar:+el('c_deposit').value,start_date:el('c_start').value,end_date:el('c_end').value})});refresh()}
el('payment-form').onsubmit=async(e)=>{e.preventDefault();await json('/payments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contract_id:+el('pay_contract').value,amount_sar:+el('pay_amount').value,due_date:el('pay_due').value})});refresh()}
el('expense-form').onsubmit=async(e)=>{e.preventDefault();await json('/expenses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({property_id:+el('e_property').value,category:el('e_cat').value,amount_sar:+el('e_amount').value,spent_on:el('e_date').value,notes:el('e_notes').value})});refresh()}
el('ticket-form').onsubmit=async(e)=>{e.preventDefault();await json('/tickets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({property_id:+el('tk_property').value,tenant_id:+el('tk_tenant').value,title:el('tk_title').value,priority:el('tk_priority').value})});refresh()}
el('audit-btn').onclick=async()=>{const d=await json('/audit/logs');el('audit').innerHTML=d.items.map(i=>`<tr><td>${i.actor}</td><td>${i.action}</td><td>${i.entity}</td></tr>`).join('')}
el('csv-btn').onclick=async()=>{const r=await api('/reports/finance.csv');const text=await r.text();el('report-msg').textContent=text.slice(0,180)+' ...';}
refresh().catch(()=>{});
</script>
</body></html>
